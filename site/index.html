<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Football App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="app.css">
    
    <!-- Feather Icons for the bottom bar -->
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body>

    <!-- Header App -->
    <header class="app-header">
        <div class="header-content">
            <div class="user-info">
                <img src="https://i.pravatar.cc/100?img=11" alt="Profile" class="avatar">
                <div>
                    <span class="greeting">Bom dia</span>
                    <span class="username">John Williams</span>
                </div>
            </div>
            <button class="icon-btn" aria-label="Search">
                <i data-feather="search"></i>
            </button>
        </div>
        
        <!-- Category Bubbles -->
        <div class="categories-scroll">
            <button class="category-btn active" data-category="world">
                <div class="cat-icon bg-blue"><i data-feather="globe"></i></div>
                Mundo
            </button>
            <button class="category-btn" data-category="brazil">
                <div class="cat-icon bg-green"><i data-feather="map-pin"></i></div>
                Brasil
            </button>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="app-main">
        
        <!-- Tab 1: Current Week (Top Events) -->
        <section id="tab-current" class="tab-content active">
            <div class="section-header">
                <h2>Top 5 da Semana</h2>
                <a href="#" class="view-all">Ver tudo</a>
            </div>
            
            <div id="current-news-container" class="news-list">
                <!-- Data will be injected here via JS -->
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
            </div>
        </section>

        <!-- Tab 2: History (All News) -->
        <section id="tab-history" class="tab-content" style="display: none;">
            <div class="section-header">
                <h2>Histórico de Notícias</h2>
                <span class="badge">Últimas Semanas</span>
            </div>
            
            <div id="history-news-container" class="news-list history-list">
                <!-- History Data injected here -->
                <div class="skeleton-card"></div>
            </div>
        </section>

    </main>

    <!-- Bottom Navigation Bar -->
    <nav class="bottom-nav">
        <button class="nav-item active" data-target="tab-current" aria-label="Semana Atual">
            <div class="nav-indicator">
                <i data-feather="home"></i>
                <span class="label">Semana</span>
            </div>
        </button>
        <button class="nav-item" data-target="tab-history" aria-label="Histórico">
            <div class="nav-indicator">
                <i data-feather="archive"></i>
                <span class="label">Histórico</span>
            </div>
        </button>
        <button class="nav-item" aria-label="Estatísticas">
            <div class="nav-indicator">
                <i data-feather="bar-chart-2"></i>
            </div>
        </button>
        <button class="nav-item" aria-label="Configurações">
            <div class="nav-indicator">
                <i data-feather="settings"></i>
            </div>
        </button>
    </nav>

    <!-- JS Scripts -->
    <script>
        feather.replace();
    </script>
    <script src="app.js"></script>
</body>
</html>
